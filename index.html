<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PKE — Personal Knowledge Engine</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #e2e8f0;
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .container { max-width: 1600px; margin: 0 auto; padding: 24px 32px; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tab {
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
      padding: 10px 20px; cursor: pointer; color: #475569; background: none; border: none;
      border-bottom: 2px solid transparent; transition: all 0.15s ease;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .tab:hover { color: #94a3b8; }
    .tab.active { color: #e2e8f0; border-bottom-color: #60a5fa; }
    .tab.drag-target { background: rgba(251,191,36,0.15); color: #fbbf24; border-bottom-color: #fbbf24; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: #f1f5f9; }
    .header .sub { font-size: 11px; color: #334155; letter-spacing: 0.06em; text-transform: uppercase; }

    /* Search */
    .search-wrap { position: relative; }
    .search-wrap input {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 8px 12px 8px 32px; color: #e2e8f0;
      font-size: 12px; width: 200px; outline: none; font-family: 'IBM Plex Mono', monospace;
    }
    .search-wrap input:focus { border-color: rgba(255,255,255,0.2); }
    .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #334155; }

    /* Buttons */
    .btn {
      font-size: 11px; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
      background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.15s ease;
    }
    .btn:hover { color: #e2e8f0; }
    .btn.active { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .view-toggle { display: flex; background: rgba(255,255,255,0.04); border-radius: 6px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
    .view-toggle .btn { border: none; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Stats */
    .stats { display: flex; gap: 24px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); margin-bottom: 16px; flex-wrap: wrap; }
    .stat-val { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 11px; color: #475569; margin-left: 6px; }
    .stat-top { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .stat-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; }

    /* Category filters */
    .cat-filters { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .cat-btn {
      font-size: 11px; border-radius: 6px; padding: 5px 12px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; transition: all 0.15s ease;
      text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid rgba(255,255,255,0.04);
      background: transparent; color: #475569;
    }
    .cat-btn.active { border-color: currentColor; }
    .cat-btn .count { margin-left: 4px; opacity: 0.5; }

    /* Kanban */
    .kanban { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
    .column { flex: 1 1 260px; min-width: 260px; max-width: 380px; display: flex; flex-direction: column; max-height: calc(100vh - 220px); }
    .column-header { display: flex; align-items: center; gap: 8px; padding: 0 4px 12px; margin-bottom: 12px; }
    .column-header .icon { font-size: 16px; }
    .column-header .label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .column-header .count { font-size: 11px; color: #475569; background: rgba(255,255,255,0.04); padding: 1px 7px; border-radius: 10px; }
    .column-body { flex: 1; overflow-y: auto; padding-right: 4px; }
    .column-empty { font-size: 12px; color: #334155; text-align: center; padding: 32px 0; }
    .column.drag-over .column-body { background: rgba(255,255,255,0.04); border-radius: 8px; outline: 2px dashed rgba(255,255,255,0.15); outline-offset: -2px; }
    .card.dragging { opacity: 0.3; transform: scale(0.95); }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
    .card.moving { opacity: 0.4; transform: scale(0.96); }
    .card-top { display: flex; align-items: flex-start; gap: 8px; }
    .card-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .card-content { flex: 1; min-width: 0; }
    .card-title {
      font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-title.expanded { -webkit-line-clamp: unset; overflow: visible; }
    .card-title a { color: #e2e8f0; text-decoration: none; }
    .card-title a:hover { color: #93c5fd; }
    .card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .card-cat { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-time { font-size: 11px; color: #64748b; }
    .card-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .card-tag { font-size: 10px; color: #64748b; background: rgba(255,255,255,0.04); padding: 1px 6px; border-radius: 3px; }

    /* Card expanded */
    .card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .card-summary {
      font-size: 13px; color: #cbd5e1; line-height: 1.7; margin-bottom: 14px;
      background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 12px;
      border-left: 2px solid rgba(148,163,184,0.3);
    }
    .card-no-summary { font-size: 12px; color: #475569; font-style: italic; margin-bottom: 14px; }
    .card-read-link {
      display: inline-block; font-size: 11px; color: #60a5fa; margin-bottom: 12px;
      text-decoration: none; font-family: 'IBM Plex Mono', monospace;
    }
    .card-read-link:hover { color: #93c5fd; text-decoration: underline; }
    .card-section-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .card-takeaway { font-size: 12px; color: #94a3b8; padding: 2px 0; line-height: 1.5; }
    .card-quote { font-size: 12px; color: #a78bfa; font-style: italic; padding: 4px 0 4px 10px; border-left: 2px solid rgba(167,139,250,0.3); line-height: 1.5; }
    .card-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .card-actions .label { font-size: 10px; color: #475569; margin-right: 4px; line-height: 24px; }
    .move-btn {
      font-size: 11px; border-radius: 5px; padding: 3px 10px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; transition: all 0.15s ease;
    }
    .delete-btn {
      font-size: 11px; color: #ef4444; background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 5px; padding: 3px 10px;
      cursor: pointer; font-family: 'IBM Plex Mono', monospace; margin-left: auto;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.2); }

    /* Quick actions on hover */
    .card { position: relative; }
    .card-quick {
      position: absolute; bottom: 6px; right: 8px; display: flex; gap: 2px;
      opacity: 0; transition: opacity 0.15s ease; pointer-events: none;
    }
    .card:hover .card-quick { opacity: 1; pointer-events: auto; }
    .card-quick button {
      background: none; border: none; cursor: pointer; font-size: 14px;
      padding: 0 2px; line-height: 1; transition: opacity 0.15s ease; opacity: 0.7;
    }
    .card-quick button:hover { opacity: 1; }
    .card-quick .qk-done { color: #34d399; }
    .card-quick .qk-del { color: #ef4444; }

    /* Trello columns (narrower for 10 lists) */
    .kanban-trello .column { flex: 1 1 200px; min-width: 200px; max-width: 300px; }
    .trello-labels { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
    .trello-label { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .trello-due { font-size: 10px; color: #64748b; margin-top: 4px; }
    .trello-due.overdue { color: #ef4444; }
    .trello-desc {
      font-size: 12px; color: #cbd5e1; line-height: 1.6; margin-bottom: 12px;
      background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 12px;
      border-left: 2px solid rgba(148,163,184,0.3); white-space: pre-wrap;
    }

    /* Loading */
    .loading { text-align: center; padding: 80px 0; color: #334155; }
    .loading .brain { font-size: 32px; margin-bottom: 12px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Error */
    .error-bar {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #f87171;
    }
    .error-bar button {
      margin-left: 12px; background: rgba(239,68,68,0.2); border: none; border-radius: 4px;
      padding: 2px 8px; color: #f87171; cursor: pointer; font-size: 11px;
    }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .kanban { flex-direction: column; }
      .column { max-width: 100%; max-height: none; }
      .stat-top { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const TRELLO_BOARD_ID = "y70SyMiD";

    const STATUSES = [
      { key: "to_read", label: "To Read", icon: "◎", color: "#60a5fa" },
      { key: "delphi", label: "Delphi", icon: "△", color: "#c084fc" },
      { key: "to_watch", label: "To Watch", icon: "▶", color: "#f472b6" },
      { key: "archived", label: "Archived", icon: "▪", color: "#6b7280" },
    ];

    const TO_TRY_COLUMNS = [
      { key: "personal_ai", label: "Personal AI", icon: "◉", color: "#a78bfa", tag: "try:personal_ai" },
      { key: "openclaw", label: "OpenClaw", icon: "◉", color: "#fb923c", tag: "try:openclaw" },
      { key: "delphi_ai", label: "Delphi AI", icon: "◉", color: "#60a5fa", tag: "try:delphi_ai" },
      { key: "other", label: "Other", icon: "◉", color: "#fbbf24", tag: "try:other" },
    ];
    const TRY_TAG_PREFIX = "try:";
    function getToTryColumnKey(item) {
      const t = (item.tags || []).find(t => t.startsWith(TRY_TAG_PREFIX));
      return t ? t.slice(TRY_TAG_PREFIX.length) : "other";
    }

    const CATEGORIES = [
      { key: "all", label: "All", color: "#94a3b8" },
      { key: "ai", label: "AI", color: "#a78bfa" },
      { key: "crypto", label: "Crypto", color: "#fbbf24" },
      { key: "investing", label: "Investing", color: "#34d399" },
      { key: "health", label: "Health", color: "#f87171" },
      { key: "personal", label: "Personal", color: "#fb923c" },
      { key: "delphi", label: "Delphi", color: "#60a5fa" },
      { key: "media", label: "Media", color: "#e879f9" },
      { key: "music", label: "Music", color: "#f472b6" },
      { key: "culture", label: "Culture", color: "#c084fc" },
      { key: "tech", label: "Tech", color: "#22d3ee" },
      { key: "geopolitics", label: "Geopolitics", color: "#fb7185" },
      { key: "uncategorized", label: "Uncategorized", color: "#6b7280" },
    ];

    // Separate categories for To Try tab (tools/products)
    const TO_TRY_CATEGORIES = [
      { key: "all", label: "All", color: "#94a3b8", match: () => true },
      { key: "claude", label: "Claude Code", color: "#a78bfa", match: (i) => /claude/i.test(i.title) || (i.tags || []).some(t => /claude/i.test(t)) },
      { key: "openclaw", label: "OpenClaw", color: "#fb923c", match: (i) => /openclaw|clawdbot/i.test(i.title) || (i.tags || []).some(t => /openclaw|try:openclaw/i.test(t)) },
      { key: "skills", label: "Skills", color: "#34d399", match: (i) => /skill/i.test(i.title) || (i.tags || []).some(t => /skill|mcp/i.test(t)) },
      { key: "agents", label: "Agents", color: "#f472b6", match: (i) => /agent/i.test(i.title) || (i.tags || []).some(t => /agent/i.test(t)) },
      { key: "marketing", label: "Marketing", color: "#60a5fa", match: (i) => /marketing|content|social|twitter|growth/i.test(i.title) || (i.tags || []).some(t => /marketing|content|social|growth/i.test(t)) },
      { key: "tools", label: "Tools", color: "#22d3ee", match: (i) => /tool/i.test(i.title) || (i.tags || []).some(t => /tool/i.test(t)) },
    ];

    const SOURCE_ICONS = {
      article: "📄", podcast: "🎙️", tweet: "🐦", thread: "🧵",
      video: "🎬", paper: "📑", book: "📚", note: "📝",
    };

    let state = {
      activeTab: (function() { try { return localStorage.getItem('pke_active_tab') || "readings"; } catch(e) { return "readings"; } })(),
      items: [],
      loading: true,
      error: null,
      activeCategory: "all",
      viewMode: "kanban",
      searchQuery: "",
      expandedId: null,
      editingId: null,
      editingTitle: "",
      trelloLists: [],
      trelloCards: [],
      trelloLoading: false,
      trelloError: null,
      trelloExpandedId: null,
      podcastItems: [],
      podcastLoading: false,
      podcastError: null,
      podcastExpandedId: null,
      podcastProcessing: false,
      podcastInputUrl: "",
      toTryExpandedId: null,
      toTrySearchQuery: "",
      toTryCategory: "all",
      // Knowledge Base
      kbItems: [],
      kbLoading: false,
      kbError: null,
      kbExpandedId: null,
      kbSearchQuery: "",
      kbActiveCategory: "all",
      kbActiveType: "all",
      kbEnriching: false,
      kbEnrichProgress: 0,
      kbEnrichTotal: 0,
      kbAISearching: false,
      kbAIAnswer: null,
      kbAISources: [],
      kbDigest: null,
      kbDigestLoading: false,
      kbDigestExpanded: false,
    };

    // Scroll position preservation
    let savedScrollPositions = {};
    
    function saveScrollPositions() {
      savedScrollPositions = {
        window: window.scrollY,
        columns: {}
      };
      document.querySelectorAll('.column-body').forEach((col, i) => {
        const status = col.closest('.column')?.dataset?.status;
        if (status) {
          savedScrollPositions.columns[status] = col.scrollTop;
        }
      });
    }
    
    function restoreScrollPositions() {
      const restore = () => {
        if (savedScrollPositions.window !== undefined) {
          window.scrollTo(0, savedScrollPositions.window);
        }
        document.querySelectorAll('.column-body').forEach(col => {
          const status = col.closest('.column')?.dataset?.status;
          if (status && savedScrollPositions.columns[status]) {
            col.scrollTop = savedScrollPositions.columns[status];
          }
        });
      };
      // Restore after paint - setTimeout is more reliable than RAF for innerHTML updates
      setTimeout(restore, 0);
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60) return "just now";
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
      if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
      return new Date(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    async function supaFetch(path, opts = {}) {
      const { headers: extraHeaders, method: rawMethod, body: rawBody, ...restOpts } = opts;
      const method = rawMethod || "GET";
      let body = null;
      if (rawBody) {
        body = typeof rawBody === "string" ? JSON.parse(rawBody) : rawBody;
      }
      const res = await fetch("/api/supabase", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path, method, body, headers: extraHeaders || {} }),
      });
      if (!res.ok) throw new Error("Supabase error: " + res.status);
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function fetchItems() {
      saveScrollPositions();
      try {
        // Only show loading spinner on initial load
        if (state.items.length === 0) {
          state.loading = true;
          render();
        }
        const data = await supaFetch("content_items?select=*&order=created_at.desc&limit=500");
        state.items = data || [];
        state.error = null;
      } catch (e) {
        state.error = e.message;
      } finally {
        state.loading = false;
        render();
        restoreScrollPositions();
      }
    }

    async function updateStatus(id, newStatus) {
      saveScrollPositions();
      state.items = state.items.map(i => i.id === id ? { ...i, status: newStatus } : i);
      render();
      restoreScrollPositions();
      try {
        await supaFetch("content_items?id=eq." + id, {
          method: "PATCH",
          body: JSON.stringify({ status: newStatus }),
          headers: { Prefer: "return=representation" },
        });
      } catch (e) { fetchItems(); }
    }

    async function deleteItem(id) {
      saveScrollPositions();
      state.items = state.items.filter(i => i.id !== id);
      state.expandedId = null;
      render();
      restoreScrollPositions();
      try { await supaFetch("content_items?id=eq." + id, { method: "DELETE" }); } catch (e) { fetchItems(); }
    }

    function startEditTitle(id, currentTitle) {
      state.editingId = id;
      state.editingTitle = currentTitle;
      render();
      setTimeout(() => {
        const input = document.querySelector('.title-edit-input');
        if (input) { input.focus(); input.select(); }
      }, 0);
    }

    function cancelEditTitle() {
      state.editingId = null;
      state.editingTitle = "";
      render();
    }

    async function saveTitle(id) {
      const newTitle = state.editingTitle.trim();
      if (!newTitle) return cancelEditTitle();
      saveScrollPositions();
      state.items = state.items.map(i => i.id === id ? { ...i, title: newTitle } : i);
      state.editingId = null;
      state.editingTitle = "";
      render();
      restoreScrollPositions();
      try {
        await supaFetch("content_items?id=eq." + id, {
          method: "PATCH",
          body: JSON.stringify({ title: newTitle }),
        });
      } catch (e) { fetchItems(); }
    }

    function handleTitleKeydown(e, id) {
      if (e.key === "Enter") { e.preventDefault(); saveTitle(id); }
      if (e.key === "Escape") { e.preventDefault(); cancelEditTitle(); }
    }

    async function trelloFetch(path, opts = {}) {
      const url = "/api/trello?path=" + encodeURIComponent(path);
      const res = await fetch(url, { method: opts.method || "GET", headers: { "Content-Type": "application/json" }, ...(opts.body ? { body: opts.body } : {}) });
      if (!res.ok) throw new Error("Trello error: " + res.status);
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function fetchTrelloBoard() {
      saveScrollPositions();
      try {
        if (state.trelloCards.length === 0) {
          state.trelloLoading = true;
          render();
        }
        const [lists, cards] = await Promise.all([
          trelloFetch("boards/" + TRELLO_BOARD_ID + "/lists?filter=open"),
          trelloFetch("boards/" + TRELLO_BOARD_ID + "/cards?filter=open&fields=name,desc,labels,due,dueComplete,idList,pos,closed"),
        ]);
        state.trelloLists = lists.map(l => ({ id: l.id, name: l.name, pos: l.pos }));
        const openListIds = new Set(lists.map(l => l.id));
        state.trelloCards = cards
          .filter(c => !c.closed && openListIds.has(c.idList))
          .map(c => ({ ...c, listId: c.idList }));
        state.trelloError = null;
      } catch (e) {
        state.trelloError = e.message;
      } finally {
        state.trelloLoading = false;
        render();
        restoreScrollPositions();
      }
    }

    async function moveTrelloCard(cardId, listId) {
      saveScrollPositions();
      state.trelloCards = state.trelloCards.map(c => c.id === cardId ? { ...c, idList: listId, listId: listId } : c);
      render();
      restoreScrollPositions();
      try {
        await trelloFetch("cards/" + cardId, { method: "PUT", body: JSON.stringify({ idList: listId }) });
      } catch (e) { fetchTrelloBoard(); }
    }

    async function archiveTrelloCard(cardId) {
      saveScrollPositions();
      state.trelloCards = state.trelloCards.filter(c => c.id !== cardId);
      state.trelloExpandedId = null;
      render();
      restoreScrollPositions();
      try {
        await trelloFetch("cards/" + cardId, { method: "PUT", body: JSON.stringify({ closed: true }) });
      } catch (e) { fetchTrelloBoard(); }
    }

    function trelloCardClick(id) {
      if (justDragged) return;

    async function fetchPodcasts() {
      saveScrollPositions();
      try {
        if (state.podcastItems.length === 0) {
          state.podcastLoading = true;
          render();

      }

    // Poll AssemblyAI transcription until complete
    async function pollTranscription(transcriptId) {
      const maxPolls = 120; // 10 minutes at 5s intervals
      for (let i = 0; i < maxPolls; i++) {
        const pollRes = await fetch("/api/podcast-transcribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ transcriptId }),
        });
        if (!pollRes.ok) throw new Error("Failed to check transcription status");
        const pollData = await pollRes.json();
        if (pollData.status === "completed") return pollData.transcript;
        if (pollData.status === "error") throw new Error("Transcription failed: " + (pollData.error || "Unknown error"));
        await new Promise(r => setTimeout(r, 5000));
      }
      throw new Error("Transcription timed out after 10 minutes");
    }

    // Run Claude analysis and save results
    async function runAnalysis(podcastId, transcript, title) {
      state.podcastItems = state.podcastItems.map(p => p.id === podcastId ? { ...p, status: "analyzing" } : p);
      render();

      const analyzeRes = await fetch("/api/podcast-analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ transcript, title }),
      });
      if (!analyzeRes.ok) { const err = await analyzeRes.json(); throw new Error(err.error || "Analysis failed"); }
      const analysis = await analyzeRes.json();

      // Combine people and companies into the people array with type field
      const allPeople = [
        ...(analysis.people || []).map(p => ({ ...p, type: p.type || "person" })),
        ...(analysis.companies || []).map(c => ({ ...c, type: c.type || "company" })),
      ];

      const patchData = { status: "ready", summary: analysis.summary, quotes: analysis.quotes, people: allPeople, content_references: analysis.content_references, topics: analysis.topics, takeaways: analysis.takeaways };
      if (analysis.category) patchData.category = analysis.category;
      await supaFetch("podcasts?id=eq." + podcastId, {
        method: "PATCH",
        body: JSON.stringify(patchData),
        headers: { Prefer: "return=representation" },
      });
      state.podcastItems = state.podcastItems.map(p => p.id === podcastId ? { ...p, ...patchData } : p);
    }

    async function submitPodcastUrl() {
      const url = state.podcastInputUrl.trim();
      if (!url) return;

      const isYouTube = /youtube\.com\/watch|youtu\.be\//.test(url);
      const isSpotify = /open\.spotify\.com\/episode/.test(url);
      if (!isYouTube && !isSpotify) {
        state.podcastError = "Please enter a YouTube or Spotify episode URL";
        render();
        return;
      }

      state.podcastProcessing = true;
      state.podcastError = null;
      state.podcastInputUrl = "";
      render();

      let podcastId;
      try {
        const inserted = await supaFetch("podcasts", {
          method: "POST",
          body: JSON.stringify({ url: url, title: "Processing...", status: "processing" }),
          headers: { Prefer: "return=representation" },
        });
        podcastId = inserted[0].id;
        state.podcastItems.unshift(inserted[0]);
        render();
      } catch (e) {
        state.podcastError = "Failed to create entry: " + e.message;
        state.podcastProcessing = false;
        render();
        return;
      }

      try {
        let youtubeUrl = url;
        let resolvedTitle = null;

        if (isSpotify) {
          const searchRes = await fetch("/api/podcast-search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ spotifyUrl: url }),
          });
          if (!searchRes.ok) { const err = await searchRes.json(); throw new Error(err.error || "Failed to find YouTube match"); }
          const searchData = await searchRes.json();
          youtubeUrl = searchData.youtubeUrl;
          resolvedTitle = searchData.spotifyTitle;
        }

        // Step 1: Try YouTube captions (fast, free)
        const transcriptRes = await fetch("/api/podcast-transcript", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ youtubeUrl: youtubeUrl }),
        });
        if (!transcriptRes.ok) { const err = await transcriptRes.json(); throw new Error(err.error || "Failed to extract transcript"); }
        const transcriptData = await transcriptRes.json();
        const title = resolvedTitle || transcriptData.title;

        // Save metadata immediately
        await supaFetch("podcasts?id=eq." + podcastId, {
          method: "PATCH",
          body: JSON.stringify({ title: title, channel: transcriptData.channel, duration: transcriptData.duration, youtube_url: youtubeUrl }),
          headers: { Prefer: "return=representation" },
        });
        state.podcastItems = state.podcastItems.map(p => p.id === podcastId ? { ...p, title, channel: transcriptData.channel, duration: transcriptData.duration, youtube_url: youtubeUrl } : p);
        render();

        let transcript;

        if (transcriptData.noCaptions) {
          // Step 2: Fall back to AssemblyAI transcription
          state.podcastItems = state.podcastItems.map(p => p.id === podcastId ? { ...p, status: "transcribing" } : p);
          await supaFetch("podcasts?id=eq." + podcastId, {
            method: "PATCH",
            body: JSON.stringify({ status: "transcribing" }),
            headers: { Prefer: "return=representation" },
          });
          render();

          const aaiRes = await fetch("/api/podcast-transcribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ youtubeUrl }),
          });
          if (!aaiRes.ok) { const err = await aaiRes.json(); throw new Error(err.error || "Failed to start transcription"); }
          const aaiData = await aaiRes.json();

          // Poll until transcript is ready
          transcript = await pollTranscription(aaiData.transcriptId);
        } else {
          transcript = transcriptData.transcript;
        }

        // Save transcript
        await supaFetch("podcasts?id=eq." + podcastId, {
          method: "PATCH",
          body: JSON.stringify({ transcript }),
          headers: { Prefer: "return=representation" },
        });

        // Step 3: Run Claude analysis
        await runAnalysis(podcastId, transcript, title);
      } catch (e) {
        try { await supaFetch("podcasts?id=eq." + podcastId, { method: "PATCH", body: JSON.stringify({ status: "error", error_message: e.message }) }); } catch (_) {}
        state.podcastItems = state.podcastItems.map(p => p.id === podcastId ? { ...p, status: "error", error_message: e.message } : p);
        state.podcastError = e.message;
      } finally {
        state.podcastProcessing = false;
        render();
      }
    }

    async function enrichKBItem(item) {
      try {
        const res = await fetch("/api/kb-enrich", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: [{ id: item.id, source_table: item.source_table, title: item.title, url: item.url, source_type: item.source_type, tags: item.tags, summary: item.summary }] }),
        });
        if (!res.ok) throw new Error("Enrichment failed");
        const data = await res.json();
        if (data.enriched > 0) {
          await fetchKBItems();
        }
      } catch (e) {
        state.kbError = "Enrichment failed: " + e.message;
        render();
      }
    }

    async function enrichAllKB() {
      const needsEnrichment = state.kbItems.filter(i => !i.has_summary);
      if (needsEnrichment.length === 0) return;

      state.kbEnriching = true;
      state.kbEnrichTotal = needsEnrichment.length;
      state.kbEnrichProgress = 0;
      render();

      // Process in batches of 3
      for (let i = 0; i < needsEnrichment.length; i += 3) {
        const batch = needsEnrichment.slice(i, i + 3).map(item => ({
          id: item.id, source_table: item.source_table, title: item.title,
          url: item.url, source_type: item.source_type, tags: item.tags, summary: item.summary,
        }));

        try {
          const res = await fetch("/api/kb-enrich", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: batch }),
          });
          if (!res.ok) throw new Error("Batch failed");
          const data = await res.json();
          state.kbEnrichProgress += data.enriched;
        } catch (e) {
          state.kbEnrichProgress += batch.length; // skip failures
        }
        render();
      }

      state.kbEnriching = false;
      render();
      await fetchKBItems();
    }

          if (type === "tool" || type === "product") return "🔧";
          if (type === "game") return "🎮";
          if (type === "video") return "📺";
          if (type === "podcast") return "🎙️";
          return "📄";
        };
        const refsHtml = (podcast.content_references || []).map(r =>
          `<div class="card-takeaway">${refIcon(r.type)} <strong>${esc(r.title)}</strong>${r.author ? " — " + esc(r.author) : ""} <span style="color:#475569">(${esc(r.type)})</span>${r.description ? `<div style="font-size:12px;color:#64748b;margin-top:2px">${esc(r.description)}</div>` : ""}</div>`
        ).join("");
        const takeawaysHtml = (podcast.takeaways || []).map(t => `<div class="card-takeaway">→ ${esc(t)}</div>`).join("");

        detail = `
          <div class="card-detail" onclick="event.stopPropagation()">
            ${podcast.summary ? `<p class="card-summary">${esc(podcast.summary)}</p>` : ""}
            ${podcast.youtube_url ? `<a class="card-read-link mono" href="${esc(podcast.youtube_url)}" target="_blank" rel="noopener">↗ Watch on YouTube</a>` : ""}
            ${podcast.url !== podcast.youtube_url && podcast.url ? `<a class="card-read-link mono" href="${esc(podcast.url)}" target="_blank" rel="noopener" style="margin-left:12px">↗ Original link</a>` : ""}
            ${quotesHtml ? `<div style="margin-bottom:10px"><div class="card-section-label mono">Key Quotes</div>${quotesHtml}</div>` : ""}
            ${peopleHtml ? `<div style="margin-bottom:10px"><div class="card-section-label mono">People Mentioned</div>${peopleHtml}</div>` : ""}
            ${companiesHtml ? `<div style="margin-bottom:10px"><div class="card-section-label mono">Companies & Organizations</div>${companiesHtml}</div>` : ""}
            ${refsHtml ? `<div style="margin-bottom:10px"><div class="card-section-label mono">Content Referenced</div>${refsHtml}</div>` : ""}
            ${takeawaysHtml ? `<div style="margin-bottom:10px"><div class="card-section-label mono">Takeaways</div>${takeawaysHtml}</div>` : ""}

              <button class="delete-btn mono" onclick="event.stopPropagation();deletePodcast('${podcast.id}')">✕ Delete</button>

          </div>`;
      } else if (expanded && isError) {
        detail = `
          <div class="card-detail" onclick="event.stopPropagation()">
            <p class="card-no-summary">Error: ${esc(podcast.error_message)}</p>
            <div class="card-actions">
              <button class="move-btn mono" style="color:#60a5fa;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);" onclick="event.stopPropagation();retryPodcast('${podcast.id}')">↻ Retry</button>
              <button class="delete-btn mono" onclick="event.stopPropagation();deletePodcast('${podcast.id}')">✕ Delete</button>
            </div>
          </div>`;
      }

      const borderColor = isError ? "#ef4444" : isWorking ? "#fbbf24" : "#a78bfa";
      return `
        <div class="card" style="border-left:3px solid ${borderColor}" onclick="podcastCardClick('${podcast.id}')">
          <div class="card-quick">
            <button class="qk-del" title="Delete" onclick="event.stopPropagation();deletePodcast('${podcast.id}')">✕</button>
          </div>
          <div class="card-top">
            <span class="card-icon">🎙️</span>
            <div class="card-content">
              <div class="card-title ${expanded ? "expanded" : ""}">${esc(podcast.title)}</div>
              <div class="card-meta">
                ${statusBadge}
                ${podcast.channel ? `<span class="card-cat mono" style="color:#a78bfa;background:rgba(167,139,250,0.15)">${esc(podcast.channel)}</span>` : ""}
                ${podcast.duration ? `<span class="card-time mono">${esc(podcast.duration)}</span>` : ""}
                <span class="card-time mono">${timeAgo(podcast.created_at)}</span>
              </div>
              ${topicTags ? `<div class="card-tags">${topicTags}</div>` : ""}
            </div>
          </div>
          ${detail}
        </div>`;
    }

    function getFiltered() {
      return state.items.filter(item => {
        if (item.status === "to_try") return false;
        const catOk = state.activeCategory === "all" || item.category === state.activeCategory;
        const q = state.searchQuery.toLowerCase();
        const searchOk = !q || (item.title || "").toLowerCase().includes(q)
          || (item.summary || "").toLowerCase().includes(q)
          || (item.tags || []).some(t => t.toLowerCase().includes(q));
        return catOk && searchOk;
      });
    }

    function getFilteredToTry() {
      return state.items.filter(item => {
        if (item.status !== "to_try") return false;
        // Use match function from category definition
        const catDef = TO_TRY_CATEGORIES.find(c => c.key === state.toTryCategory);
        const catOk = catDef ? catDef.match(item) : true;
        const q = state.toTrySearchQuery.toLowerCase();
        const searchOk = !q || (item.title || "").toLowerCase().includes(q)
          || (item.summary || "").toLowerCase().includes(q)
          || (item.tags || []).some(t => t.toLowerCase().includes(q));
        return catOk && searchOk;
      });
    }

    async function moveToTryColumn(id, columnKey) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;
      saveScrollPositions();
      const newTags = (item.tags || []).filter(t => !t.startsWith(TRY_TAG_PREFIX));
      if (columnKey !== "other") newTags.push(TRY_TAG_PREFIX + columnKey);
      state.items = state.items.map(i => i.id === id ? { ...i, tags: newTags } : i);
      render();
      restoreScrollPositions();
      try {
        await supaFetch("content_items?id=eq." + id, {
          method: "PATCH",
          body: JSON.stringify({ tags: newTags }),
          headers: { Prefer: "return=representation" },
        });
      } catch (e) { fetchItems(); }
    }

    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderCard(item) {
      const cat = CATEGORIES.find(c => c.key === item.category) || CATEGORIES[CATEGORIES.length - 1];
      const expanded = state.expandedId === item.id;

        ).join("");

        }

        let quotes = "";
        if (item.quotes && item.quotes.length > 0) {
          quotes = `<div style="margin-bottom:10px"><div class="card-section-label mono">Quotes</div>${item.quotes.map(q => `<div class="card-quote">"${esc(q)}"</div>`).join("")}</div>`;
        }

        detail = `
          <div class="card-detail" onclick="event.stopPropagation()">

            ${takeaways}
            ${quotes}
            <div class="card-actions">
              <span class="label mono">Move →</span>
              ${moves}
              ${item.status !== "to_try" ? `<button class="move-btn mono" style="color:#fbbf24;background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.3);" onclick="event.stopPropagation();updateStatus('${item.id}','to_try')">★ To Try</button>` : ""}

          ${item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" draggable="false" onclick="event.stopPropagation()" style="margin-left:8px;font-size:12px;color:#60a5fa;">↗</a>` : ""}`;

        titleHtml = item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" draggable="false" onclick="event.stopPropagation()">${esc(item.title)}</a>` : esc(item.title);

      return `
        <div class="card" data-id="${item.id}" style="border-left:3px solid ${cat.color}" onclick="cardClick('${item.id}')">

              ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="card-tag mono">#${esc(t)}</span>`).join("")}</div>` : ""}
            </div>

    function renderToTryCard(item) {

              </div>
              ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="card-tag mono">#${esc(t)}</span>`).join("")}</div>` : ""}
            </div>
          </div>
          ${detail}
        </div>`;

    function render() {
      const filtered = getFiltered();
      const thisWeek = filtered.filter(i => (Date.now() - new Date(i.created_at)) < 7 * 86400000).length;

            <div class="header-left">
              <span style="font-size:28px">📋</span>

              oninput="state.podcastInputUrl=this.value"
              onkeydown="if(event.key==='Enter')submitPodcastUrl()"
              style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;outline:none;font-family:'IBM Plex Mono',monospace;"
            />
            <button class="btn" onclick="submitPodcastUrl()" ${state.podcastProcessing ? "disabled" : ""}
              style="padding:10px 20px;${state.podcastProcessing ? "opacity:0.5;cursor:wait;" : ""}"
            >${state.podcastProcessing ? "⏳ Processing..." : "+ Analyze"}</button>
          </div>

          ${state.podcastError ? `<div class="error-bar mono">⚠ ${esc(state.podcastError)}<button onclick="state.podcastError=null;render()">dismiss</button></div>` : ""}
          ${podcastContent}
        `;
      } else if (state.activeTab === "kb") {
        const kbFiltered = getFilteredKB();
        const kbUsedCats = new Set(state.kbItems.map(i => i.category));
        const kbUsedTypes = new Set(state.kbItems.map(i => i.source_type));
        const kbThisWeek = state.kbItems.filter(i => (Date.now() - new Date(i.created_at)) < 604800000).length;
        const kbWithSummary = state.kbItems.filter(i => i.has_summary).length;
        const kbArticles = state.kbItems.filter(i => i.source_table === "content").length;
        const kbPodcasts = state.kbItems.filter(i => i.source_table === "podcast").length;

        let kbContent;
        if (state.kbLoading && state.kbItems.length === 0) {
          kbContent = '<div class="loading mono"><div class="brain">🧠</div><div>loading knowledge base...</div></div>';
        } else if (state.kbItems.length === 0) {
          kbContent = '<div style="text-align:center;padding:48px 0;color:#334155;font-size:12px" class="mono">knowledge base is empty — save articles and analyze podcasts to populate it</div>';
        } else if (kbFiltered.length === 0) {
          kbContent = '<div style="text-align:center;padding:48px 0;color:#334155;font-size:12px" class="mono">no items match your filters</div>';
        } else {
          kbContent = `<div style="display:grid;grid-template-columns:1fr;gap:2px">${kbFiltered.map(renderKBCard).join("")}</div>`;
        }

        const typeFilters = [
          { key: "all", label: "All" },
          ...["article", "podcast", "video", "paper", "book", "note", "tweet", "thread"]
            .filter(t => kbUsedTypes.has(t))
            .map(t => ({ key: t, label: t.charAt(0).toUpperCase() + t.slice(1) + "s", icon: SOURCE_ICONS[t] || "" }))
        ];

        document.getElementById("app").innerHTML = `
          ${tabBar}
          <div class="header">
            <div class="header-left">
              <span style="font-size:28px">🧠</span>
              <div>
                <h1 class="mono">Knowledge Base</h1>
                <p class="sub mono">Everything you've saved, unified</p>
              </div>
            </div>
            <div class="header-right">
              ${state.kbEnriching
                ? `<span class="mono" style="font-size:11px;color:#fbbf24">enriching ${state.kbEnrichProgress}/${state.kbEnrichTotal}...</span>`
                : state.kbItems.some(i => !i.has_summary)
                  ? `<button class="btn" onclick="enrichAllKB()" style="font-size:11px;padding:6px 12px;color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">✦ Enrich All (${state.kbItems.filter(i => !i.has_summary).length})</button>`
                  : ""
              }
              <button class="btn" onclick="fetchKBItems()">↻</button>
            </div>
          </div>

          <div style="margin-bottom:16px;display:flex;gap:8px;">
            <div style="flex:1;position:relative">
              <input type="text" id="kb-search-input" class="mono" placeholder="Ask your knowledge base... e.g. 'what did Huberman say about dopamine?'"
                value="${esc(state.kbSearchQuery)}"
                oninput="state.kbSearchQuery=this.value"
                onkeydown="if(event.key==='Enter'&&this.value.trim())searchKB()"
                onblur="render()"
                style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:12px 14px;color:#e2e8f0;font-size:13px;outline:none;font-family:'IBM Plex Mono',monospace;"
              />
            </div>
            <button class="btn" onclick="state.kbSearchQuery=document.getElementById('kb-search-input').value;searchKB()" ${state.kbAISearching ? "disabled" : ""}
              style="padding:10px 20px;${state.kbAISearching ? "opacity:0.5;cursor:wait;" : ""}background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3)">
              ${state.kbAISearching ? "⏳ Searching..." : "🔍 Ask AI"}
            </button>
            ${state.kbAIAnswer ? `<button class="btn" onclick="clearKBSearch()" style="padding:10px 14px;font-size:11px">✕ Clear</button>` : ""}
          </div>

          ${state.kbAIAnswer ? `
            <div style="margin-bottom:20px;padding:16px 20px;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:10px;border-left:3px solid #a78bfa">
              <div class="mono" style="font-size:11px;color:#a78bfa;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">AI Answer</div>
              <div style="font-size:13px;color:#e2e8f0;line-height:1.6;white-space:pre-wrap">${esc(state.kbAIAnswer)}</div>
              ${state.kbAISources.length ? `
                <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px">
                  ${state.kbAISources.map(s => `
                    <a href="${esc(s.url || '#')}" target="_blank" rel="noopener" class="mono" style="font-size:10px;padding:3px 8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#94a3b8;text-decoration:none;display:inline-flex;align-items:center;gap:4px">
                      [${s.index}] ${SOURCE_ICONS[s.source_type] || "📄"} ${esc((s.title || "").substring(0, 40))}${(s.title || "").length > 40 ? "..." : ""}
                    </a>
                  `).join("")}
                </div>
              ` : ""}
            </div>
          ` : ""}

          ${state.kbDigest ? `
            <div style="margin-bottom:16px;padding:14px 18px;background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.12);border-radius:10px;border-left:3px solid #34d399">
              <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="state.kbDigestExpanded=!state.kbDigestExpanded;render()">
                <div>
                  <span class="mono" style="font-size:11px;color:#34d399;text-transform:uppercase;letter-spacing:0.05em">Weekly Digest</span>
                  <span style="font-size:13px;color:#e2e8f0;margin-left:8px;font-weight:500">${esc(state.kbDigest.content?.headline || "This Week")}</span>
                  <span class="mono" style="font-size:11px;color:#64748b;margin-left:8px">${state.kbDigest.week_start || ""}</span>
                </div>
                <span style="color:#64748b;font-size:12px">${state.kbDigestExpanded ? "▲" : "▼"}</span>
              </div>
              ${state.kbDigestExpanded ? `
                <div style="margin-top:12px;font-size:13px;color:#cbd5e1;line-height:1.6;white-space:pre-wrap">${esc(state.kbDigest.content?.overview || "")}</div>
                ${state.kbDigest.content?.highlights?.length ? `
                  <div style="margin-top:12px">
                    <div class="mono" style="font-size:11px;color:#34d399;margin-bottom:6px;text-transform:uppercase">Highlights</div>
                    ${state.kbDigest.content.highlights.map(h => `
                      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">→ <strong style="color:#e2e8f0">${esc(h.title)}</strong> — ${esc(h.why)}</div>
                    `).join("")}
                  </div>
                ` : ""}
                ${state.kbDigest.content?.categories ? `
                  <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px">
                    ${Object.entries(state.kbDigest.content.categories).map(([cat, summary]) => {
                      const c = CATEGORIES.find(x => x.key === cat);
                      return '<span class="mono" style="font-size:10px;padding:3px 8px;background:' + (c ? c.color : '#6b7280') + '10;border:1px solid ' + (c ? c.color : '#6b7280') + '25;border-radius:4px;color:' + (c ? c.color : '#94a3b8') + '">' + cat + '</span>';
                    }).join("")}
                  </div>
                ` : ""}
              ` : ""}
            </div>
          ` : `
            <div style="margin-bottom:16px;text-align:center">
              <button class="btn mono" onclick="generateKBDigest()" ${state.kbDigestLoading ? "disabled" : ""}
                style="font-size:11px;padding:8px 16px;color:#34d399;border:1px solid rgba(52,211,153,0.3);${state.kbDigestLoading ? "opacity:0.5;cursor:wait;" : ""}">
                ${state.kbDigestLoading ? "⏳ Generating digest..." : "📊 Generate Weekly Digest"}
              </button>
            </div>
          `}

          <div class="stats">
            <div class="mono"><span class="stat-val" style="color:#e2e8f0">${state.kbItems.length}</span><span class="stat-label">total</span></div>
            <div class="mono"><span class="stat-val" style="color:#60a5fa">${kbArticles}</span><span class="stat-label">articles</span></div>
            <div class="mono"><span class="stat-val" style="color:#a78bfa">${kbPodcasts}</span><span class="stat-label">podcasts</span></div>
            <div class="mono"><span class="stat-val" style="color:#fbbf24">${kbThisWeek}</span><span class="stat-label">this week</span></div>
            <div class="mono"><span class="stat-val" style="color:#34d399">${Math.round(kbWithSummary / Math.max(state.kbItems.length, 1) * 100)}%</span><span class="stat-label">enriched</span></div>
          </div>

          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            ${typeFilters.map(t => `
              <button class="cat-btn ${state.kbActiveType === t.key ? "active" : ""}" style="${state.kbActiveType === t.key ? "color:#e2e8f0;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)" : ""}" onclick="state.kbActiveType='${t.key}';render()">
                ${t.icon ? t.icon + " " : ""}${t.label}
              </button>
            `).join("")}
          </div>

          <div class="cat-filters">
            ${CATEGORIES.filter(c => c.key === "all" || kbUsedCats.has(c.key)).map(c => `
              <button class="cat-btn ${state.kbActiveCategory === c.key ? "active" : ""}" style="${state.kbActiveCategory === c.key ? `color:${c.color};background:${c.color}18;border-color:${c.color}40` : ""}" onclick="state.kbActiveCategory='${c.key}';render()">
                ${c.label}${c.key !== "all" ? `<span class="count">${state.kbItems.filter(i => i.category === c.key).length}</span>` : ""}
              </button>
            `).join("")}
          </div>

          ${state.kbError ? `<div class="error-bar mono">⚠ ${esc(state.kbError)}<button onclick="fetchKBItems()">retry</button></div>` : ""}
          ${kbContent}
        `;
      } else {
        document.getElementById("app").innerHTML = `
          ${tabBar}
          <div class="header">
            <div class="header-left">
              <span style="font-size:28px">🧠</span>
              <div>
                <h1 class="mono">PKE</h1>
                <p class="sub mono">Personal Knowledge Engine</p>
              </div>
            </div>
            <div class="header-right">
              <div class="search-wrap">
                <span class="icon">⌕</span>
                <input type="text" placeholder="search..." value="${esc(state.searchQuery)}" oninput="state.searchQuery=this.value;render()" />
              </div>
              <div class="view-toggle">
                <button class="btn ${state.viewMode === "kanban" ? "active" : ""}" onclick="state.viewMode='kanban';render()">KANBAN</button>
                <button class="btn ${state.viewMode === "list" ? "active" : ""}" onclick="state.viewMode='list';render()">LIST</button>
              </div>
              <button class="btn" onclick="fetchItems()">↻</button>
            </div>
          </div>

          <div class="stats">
            <div class="mono"><span class="stat-val" style="color:#e2e8f0">${filtered.length}</span><span class="stat-label">total</span></div>
            <div class="mono"><span class="stat-val" style="color:#60a5fa">${thisWeek}</span><span class="stat-label">this week</span></div>
            <div class="mono"><span class="stat-val" style="color:#fbbf24">${toRead}</span><span class="stat-label">to read</span></div>
            ${sorted.length ? `<div class="stat-top">${sorted.map(([cat, count]) => {
              const c = CATEGORIES.find(x => x.key === cat);
              return `<span class="stat-tag mono" style="color:${c?.color};background:${c?.color || "#6b7280"}15">${cat} (${count})</span>`;
            }).join("")}</div>` : ""}
          </div>

          <div class="cat-filters">
            ${CATEGORIES.filter(c => c.key === "all" || usedCats.has(c.key)).map(c => `
              <button class="cat-btn ${state.activeCategory === c.key ? "active" : ""}" style="${state.activeCategory === c.key ? `color:${c.color};background:${c.color}18;border-color:${c.color}40` : ""}" onclick="state.activeCategory='${c.key}';render()">
                ${c.label}${c.key !== "all" ? `<span class="count">${state.items.filter(i => i.category === c.key && i.status !== "to_try").length}</span>` : ""}
              </button>
            `).join("")}
          </div>

          ${state.error ? `<div class="error-bar mono">⚠ ${esc(state.error)}<button onclick="fetchItems()">retry</button></div>` : ""}
          ${content}
        `;
      }
    }

    function switchTab(tab) {
      state.activeTab = tab;
      // Persist tab to localStorage so it survives refresh
      try { localStorage.setItem('pke_active_tab', tab); } catch(e) {}
      if (tab === "todo" && state.trelloCards.length === 0 && !state.trelloLoading) {
        fetchTrelloBoard();
      } else if (tab === "podcasts" && state.podcastItems.length === 0 && !state.podcastLoading) {
        fetchPodcasts();
      } else if (tab === "kb" && state.kbItems.length === 0 && !state.kbLoading) {
        fetchKBItems();
      } else {
        render();
      }
    }

    // Drag and drop — mouse events (not HTML5 DnD API)
    let drag = null;
    let justDragged = false;

    function cardClick(id) {
      if (justDragged) return;
      saveScrollPositions();
      state.expandedId = state.expandedId === id ? null : id;
      render();
      restoreScrollPositions();
    }

    // Prevent native browser drag (links/images inside cards steal mouse events)
    document.addEventListener("dragstart", function(e) {
      if (drag) { e.preventDefault(); return; }
      var card = e.target.closest(".card");
      if (card) e.preventDefault();
    });

    document.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;
      const card = e.target.closest(".card");
      if (!card) return;
      if (e.target.closest(".card-detail")) return;
      drag = { id: card.dataset.id, source: card.dataset.source || "pke", startX: e.clientX, startY: e.clientY, card: card, clone: null, active: false, targetStatus: null };
    });

    document.addEventListener("mousemove", function(e) {
      if (!drag) return;
      e.preventDefault(); // Prevent text selection early
      if (!drag.active) {
        if (Math.abs(e.clientX - drag.startX) < 5 && Math.abs(e.clientY - drag.startY) < 5) return;
        drag.active = true;
        drag.card.classList.add("dragging");
        document.body.style.userSelect = "none"; // Disable text selection while dragging
        document.body.style.webkitUserSelect = "none";
        var rect = drag.card.getBoundingClientRect();
        var clone = drag.card.cloneNode(true);
        clone.style.cssText = "position:fixed;width:" + rect.width + "px;pointer-events:none;z-index:9999;opacity:0.85;transform:rotate(2deg) scale(1.02);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:14px 16px;";
        document.body.appendChild(clone);
        drag.clone = clone;
        drag.offsetX = e.clientX - rect.left;
        drag.offsetY = e.clientY - rect.top;
      }
      drag.clone.style.left = (e.clientX - drag.offsetX) + "px";
      drag.clone.style.top = (e.clientY - drag.offsetY) + "px";
      document.querySelectorAll(".column.drag-over").forEach(function(c) { c.classList.remove("drag-over"); });
      document.querySelectorAll(".tab.drag-target").forEach(function(t) { t.classList.remove("drag-target"); });
      // Hide clone so elementFromPoint reliably finds the column underneath
      drag.clone.style.visibility = "hidden";
      var el = document.elementFromPoint(e.clientX, e.clientY);
      drag.clone.style.visibility = "";
      // Check for tab drop target (To Try and Podcasts tabs accept drops)
      var tab = el && el.closest(".tab[data-tab]");
      if (tab && (tab.dataset.tab === "totry" || tab.dataset.tab === "podcasts") && drag.source === "pke") {
        tab.classList.add("drag-target");
        drag.targetTab = tab.dataset.tab;
        drag.targetStatus = null;
      } else {
        drag.targetTab = null;
        var col = el && el.closest(".column");
        if (col) {
          col.classList.add("drag-over");
          drag.targetStatus = col.dataset.status;
        }
      }
    });

    document.addEventListener("mouseup", function(e) {
      if (!drag) return;
      if (drag.active) {
        // Re-enable text selection
        document.body.style.userSelect = "";
        document.body.style.webkitUserSelect = "";
        if (drag.clone) {
          drag.clone.style.visibility = "hidden";
          drag.clone.remove();
        }
        drag.card.classList.remove("dragging");
        document.querySelectorAll(".column.drag-over").forEach(function(c) { c.classList.remove("drag-over"); });
        document.querySelectorAll(".tab.drag-target").forEach(function(t) { t.classList.remove("drag-target"); });
        var el = document.elementFromPoint(e.clientX, e.clientY);
        
        // Check if dropped on a tab (To Try or Podcasts)
        var tab = el && el.closest(".tab[data-tab]");
        if (tab && tab.dataset.tab === "totry" && drag.source === "pke") {
          var item = state.items.find(function(i) { return i.id === drag.id; });
          if (item && item.status !== "to_try") {
            updateStatus(drag.id, "to_try");
          }
        } else if (tab && tab.dataset.tab === "podcasts" && drag.source === "pke") {
          var item = state.items.find(function(i) { return i.id === drag.id; });
          if (item && item.url) {
            // Check if URL looks like a podcast (YouTube or Spotify)
            var url = item.url;
            var isYouTube = /youtube\.com\/watch|youtu\.be\//.test(url);
            var isSpotify = /open\.spotify\.com\/episode/.test(url);
            if (isYouTube || isSpotify) {
              state.podcastInputUrl = url;
              switchTab("podcasts");
              setTimeout(function() { submitPodcastUrl(); }, 100);
            } else {
              alert("This URL doesn't look like a YouTube or Spotify podcast. Only YouTube videos and Spotify episodes can be analyzed.");
            }
          }
        } else {
          var col = el && el.closest(".column");
          var target = col ? col.dataset.status : drag.targetStatus;
          if (target) {
            if (drag.source === "trello") {
              var card = state.trelloCards.find(function(c) { return c.id === drag.id; });
              if (card && card.idList !== target) moveTrelloCard(drag.id, target);
            } else if (drag.source === "totry") {
              var item = state.items.find(function(i) { return i.id === drag.id; });
              if (item && getToTryColumnKey(item) !== target) moveToTryColumn(drag.id, target);
            } else {
              var item = state.items.find(function(i) { return i.id === drag.id; });
              if (item && item.status !== target) updateStatus(drag.id, target);
            }
          }
        }
        justDragged = true;
        setTimeout(function() { justDragged = false; }, 0);
        window.addEventListener("click", function(ev) { ev.preventDefault(); ev.stopPropagation(); }, { capture: true, once: true });
      }
      drag = null;
    });

    // Init
    fetchItems();
    setInterval(fetchItems, 30000);
  </script>
</body>
</html>
